apiVersion: apps/v1
kind: Deployment

metadata:
  name: nignix-demo

spec:
  replicas: 2
  selector:
    matchLabels:
      app: nignix-demo

  template:
    metadata:
      labels:
        app: nignix-demo

    spec:
      containers:
      - name: nginx
        image: nginx
        ports:
        - containerPort: 80