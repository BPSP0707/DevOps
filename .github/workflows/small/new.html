<!DOCTYPE html>
<html>
    <head>
        <title>FASTA PARSER</title>
    </head>
    <body>
        <h2>FASTA PARSER</h2>
        <textarea id="input" rows="10" cols="50" placeholder="enter fasta format data here"></textarea>
        <button onclick="parseFasta()">Parse FASTA</button>

        <hr>

        <h3>Parsed Output:</h3>
        <div id="output"></div>

        <script>
            function parseFasta(){
                let fasta=document.getElementById("input").value

                fetch("/parse",{
                    method:"POST",
                    headers:{"Content-Type":"application/json"},
                    body: JSON.stringify({fasta:fasta})
                })

                .then(function(response) {
                    return response.json();
                })

                .then(function(data) {

                    let outputDiv = document.getElementById("output");
                    outputDiv.innerHTML = "Total Sequences: " + data.count + "<br><br>";

                    for (let i = 0; i < data.sequences.length; i++) {

                        let seq = data.sequences[i];

                        let block = document.createElement("div");
                        block.innerHTML =
                            "ID: " + seq.id + "<br>" +
                            "Sequence: " + seq.sequence + "<br>" +
                            "Length: " + seq.length + "<br>" +
                            "GC Content: loading...<br>" +
                            "Reverse Complement: loading...<br><hr>";

                        outputDiv.appendChild(block);
                    }               
})
        </script>

    </body>
</html>
